<script>
  const FEEDS = {
    top: "https://news.google.com/rss?hl=fr&gl=FR&ceid=FR:fr",
    world: "https://news.google.com/rss/headlines/section/topic/WORLD?hl=fr&gl=FR&ceid=FR:fr",
    business: "https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=fr&gl=FR&ceid=FR:fr",
    sports: "https://news.google.com/rss/headlines/section/topic/SPORTS?hl=fr&gl=FR&ceid=FR:fr",
  };

  const LABELS = {
    top: "À la une",
    world: "Monde",
    business: "Business",
    sports: "Sports",
  };

  let currentFeed = "top";

  function parseDate(str) {
    if (!str) return "";
    const d = new Date(str);
    return isNaN(d)
      ? str
      : d.toLocaleDateString("fr-FR", {
          day: "numeric",
          month: "long",
          hour: "2-digit",
          minute: "2-digit"
        });
  }

  function getSourceFromTitle(title) {
    const parts = title.split(" - ");
    return parts.length > 1 ? parts[parts.length - 1].trim() : "";
  }

  function getCleanTitle(title) {
    const parts = title.split(" - ");
    if (parts.length > 1) parts.pop();
    return parts.join(" - ").trim();
  }

  async function fetchXmlWithFallback(feedUrl) {
    const allOriginsUrl =
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(feedUrl);

    try {
      const res = await fetch(allOriginsUrl);
      if (!res.ok) throw new Error("AllOrigins indisponible");
      const text = await res.text();
      if (!text || !text.includes("<rss")) throw new Error("Flux XML invalide");
      return text;
    } catch (err) {
      const rss2jsonUrl =
        "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feedUrl);

      const res = await fetch(rss2jsonUrl);
      if (!res.ok) throw new Error("RSS2JSON indisponible");
      const data = await res.json();
      if (!data.items || !data.items.length) {
        throw new Error("Aucun article trouvé");
      }

      return data;
    }
  }

  function renderFromXml(xmlText, feedKey) {
    const mainCol = document.getElementById("main-col");
    const sideCol = document.getElementById("side-col");
    const tickerInner = document.getElementById("ticker-inner");

    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");
    const parseError = xml.querySelector("parsererror");
    if (parseError) throw new Error("Erreur de parsing XML");

    const items = Array.from(xml.querySelectorAll("item"));
    if (!items.length) throw new Error("Aucun article trouvé dans le flux");

    tickerInner.textContent = items
      .map((item) => getCleanTitle(item.querySelector("title")?.textContent || ""))
      .join("   ·   ");

    const mainItems = items.slice(0, 5);
    const sideItems = items.slice(5, 10);

    mainCol.innerHTML = "";
    sideCol.innerHTML = "";

    mainItems.forEach((item) => {
      const rawTitle = item.querySelector("title")?.textContent || "";
      const title = getCleanTitle(rawTitle);
      const link = item.querySelector("link")?.textContent?.trim() || "#";
      const date = parseDate(item.querySelector("pubDate")?.textContent || "");
      const sourceNode = item.querySelector("source");
      const source = sourceNode?.textContent?.trim() || getSourceFromTitle(rawTitle);
      const desc = item.querySelector("description")?.textContent || "";
      const cleanDesc = desc.replace(/<[^>]*>/g, "").trim().slice(0, 160);

      const card = document.createElement("div");
      card.className = "news-card";
      card.innerHTML = `
        <div class="news-card-body">
          <span class="tag">${LABELS[feedKey]}</span>
          <h3><a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
          ${cleanDesc ? `<p>${cleanDesc}…</p>` : ""}
          <div class="meta">
            ${source ? `<span>${source}</span>` : ""}
            ${date ? `<span>${date}</span>` : ""}
          </div>
        </div>
      `;
      mainCol.appendChild(card);
    });

    if (sideItems.length) {
      const sideCard = document.createElement("div");
      sideCard.className = "side-card";
      sideCard.innerHTML = `<h3>Autres titres</h3><div class="mini-list" id="mini-list"></div>`;
      sideCol.appendChild(sideCard);

      const miniList = sideCard.querySelector("#mini-list");

      sideItems.forEach((item) => {
        const rawTitle = item.querySelector("title")?.textContent || "";
        const title = getCleanTitle(rawTitle);
        const link = item.querySelector("link")?.textContent?.trim() || "#";
        const sourceNode = item.querySelector("source");
        const source = sourceNode?.textContent?.trim() || getSourceFromTitle(rawTitle);

        const el = document.createElement("div");
        el.className = "mini-item";
        el.innerHTML = `
          <a href="${link}" target="_blank" rel="noopener noreferrer">
            <strong>${title}</strong>
            ${source ? `<span>${source}</span>` : ""}
          </a>
        `;
        miniList.appendChild(el);
      });
    }
  }

  function renderFromJson(data, feedKey) {
    const mainCol = document.getElementById("main-col");
    const sideCol = document.getElementById("side-col");
    const tickerInner = document.getElementById("ticker-inner");

    const items = data.items || [];
    if (!items.length) throw new Error("Aucun article trouvé");

    tickerInner.textContent = items
      .map((item) => getCleanTitle(item.title || ""))
      .join("   ·   ");

    const mainItems = items.slice(0, 5);
    const sideItems = items.slice(5, 10);

    mainCol.innerHTML = "";
    sideCol.innerHTML = "";

    mainItems.forEach((item) => {
      const rawTitle = item.title || "";
      const title = getCleanTitle(rawTitle);
      const link = item.link || "#";
      const date = parseDate(item.pubDate || "");
      const source = getSourceFromTitle(rawTitle);
      const cleanDesc = (item.description || "")
        .replace(/<[^>]*>/g, "")
        .trim()
        .slice(0, 160);

      const card = document.createElement("div");
      card.className = "news-card";
      card.innerHTML = `
        <div class="news-card-body">
          <span class="tag">${LABELS[feedKey]}</span>
          <h3><a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
          ${cleanDesc ? `<p>${cleanDesc}…</p>` : ""}
          <div class="meta">
            ${source ? `<span>${source}</span>` : ""}
            ${date ? `<span>${date}</span>` : ""}
          </div>
        </div>
      `;
      mainCol.appendChild(card);
    });

    if (sideItems.length) {
      const sideCard = document.createElement("div");
      sideCard.className = "side-card";
      sideCard.innerHTML = `<h3>Autres titres</h3><div class="mini-list" id="mini-list"></div>`;
      sideCol.appendChild(sideCard);

      const miniList = sideCard.querySelector("#mini-list");

      sideItems.forEach((item) => {
        const rawTitle = item.title || "";
        const title = getCleanTitle(rawTitle);
        const link = item.link || "#";
        const source = getSourceFromTitle(rawTitle);

        const el = document.createElement("div");
        el.className = "mini-item";
        el.innerHTML = `
          <a href="${link}" target="_blank" rel="noopener noreferrer">
            <strong>${title}</strong>
            ${source ? `<span>${source}</span>` : ""}
          </a>
        `;
        miniList.appendChild(el);
      });
    }
  }

  async function loadFeed(feedKey) {
    const mainCol = document.getElementById("main-col");
    const sideCol = document.getElementById("side-col");
    const tickerInner = document.getElementById("ticker-inner");

    mainCol.innerHTML = '<div class="loading-msg">Chargement des actualités...</div>';
    sideCol.innerHTML = "";
    tickerInner.textContent = "Chargement des actualités en direct...";

    try {
      const result = await fetchXmlWithFallback(FEEDS[feedKey]);

      if (typeof result === "string") {
        renderFromXml(result, feedKey);
      } else {
        renderFromJson(result, feedKey);
      }
    } catch (err) {
      console.error(err);
      mainCol.innerHTML = `
        <div class="error-msg">
          <strong>Impossible de charger les actualités.</strong><br>
          ${err.message}
        </div>
      `;
      tickerInner.textContent = "Chargement impossible — réessayez plus tard.";
    }
  }

  document.querySelectorAll(".feed-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".feed-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      currentFeed = btn.dataset.feed;
      loadFeed(currentFeed);
    });
  });

  loadFeed(currentFeed);
</script>
