<!DOCTYPE html>
<html lang="fr">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3338685171783718"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Actualites du jour en direct sur SNG Portal."
    />
    <title>Actualites du jour - SNG Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="actualites">
    <div class="site-shell">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="./index.html" aria-label="Accueil SNG Portal">
            <img class="brand-logo" src="./logo-sng.svg" alt="Logo SNG Portal" />
            <span class="brand-copy">
              <span class="brand-kicker">SNG Media</span>
              <span class="brand-title">SNG Portal</span>
            </span>
          </a>
          <button
            class="menu-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="main-nav"
          >
            Menu
          </button>
          <nav id="main-nav" class="main-nav" aria-label="Navigation principale">
            <a href="./index.html">Accueil</a>
            <a href="./crypto.html">Crypto</a>
            <a class="is-current" href="./actualites.html">Actualites</a>
            <a href="./meteo.html">Meteo</a>
            <a href="./marches.html">Marches</a>
            <a href="./loterie.html">Loterie Monde</a>
            <a href="./sports.html">Paris sportifs</a>
            <a href="./jeux.html">Jeux</a>
            <a href="./blog.html">Blog</a>
            <a href="./satellites.html">Satellites</a>
            <a href="./planetes.html">Planetes</a>
            <a href="./scolaire.html">Scolaire</a>
            <a href="./contact.html">Contact</a>
          </nav>
        </div>
      </header>

      <main>
        <section id="news-feed-zone" class="page-section">
          <div class="container">
            <article class="module module-wide reveal">
              <div class="module-head split-head">
                <div>
                  <p class="section-tag">Actualites</p>
                  <h1>Toutes les actualites directement</h1>
                </div>
                <div class="toolbar-inline">
                  <span id="news-status" class="status-pill status-neutral">Chargement...</span>
                  <button id="refresh-news" class="ghost-button" type="button">Rafraichir</button>
                </div>
              </div>

              <form id="news-search-form" class="search-bar search-bar-panel" role="search">
                <label class="sr-only" for="searchInput">Recherche actualites</label>
                <span class="search-icon" aria-hidden="true">N</span>
                <input
                  id="searchInput"
                  type="search"
                  placeholder="Exemple: Haiti, guerre, IA, Trump, Tesla..."
                />
                <button id="searchBtn" type="submit">Chercher</button>
              </form>

              <div id="news-topics" class="pill-row pill-row-spaced"></div>
              <div id="newsResults" class="article-list news-list"></div>
            </article>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <p>(c) 2026 SNG Portal. Tous droits reserves.</p>
          <p>Actualites du jour en direct.</p>
        </div>
      </footer>
    </div>

    <script src="./site.js"></script>
    <script src="./news.js"></script>
  </body>
</html>
