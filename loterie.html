<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SNG Portal — Loterie Monde</title>

  <style>
    :root {
      --bg: #06101a;
      --panel: rgba(8, 14, 24, 0.62);
      --line: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.80);
      --accent: #ff5f8f;
      --accent2: #ff83ab;
      --shadow: 0 20px 40px rgba(0,0,0,0.28);
      --max: 1240px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(4,10,18,0.16), rgba(4,10,18,0.30)),
        url('https://luisguzmanune75-jpg.github.io/fond-loterie.jpg') center/cover no-repeat fixed;
      position: relative;
    }

    body::after {
      content:"";
      position:fixed;
      inset:-4%;
      background:url('https://luisguzmanune75-jpg.github.io/fond-loterie.jpg') center/cover;
      opacity:.2;
      animation:bgFloat 30s ease-in-out infinite alternate;
      z-index:0;
    }

    @keyframes bgFloat {
      0% { transform:scale(1.05); }
      100% { transform:scale(1.1) translate(-10px,6px); }
    }

    @keyframes glow {
      0%,100% { box-shadow:0 20px 40px rgba(0,0,0,0.3);}
      50% { box-shadow:0 20px 40px rgba(0,0,0,0.3),0 0 25px rgba(255,95,143,0.2);}
    }

    .topbar,.page,.footer { position:relative; z-index:2; }

    .topbar {
      position:sticky;
      top:0;
      background:rgba(4,9,15,0.7);
      backdrop-filter:blur(10px);
      padding:15px;
    }

    .topbar-inner {
      max-width:var(--max);
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .menu a {
      margin:0 10px;
      color:#fff;
      text-decoration:none;
      font-weight:bold;
    }

    .hero {
      background:rgba(7,13,22,0.55);
      border-radius:25px;
      padding:30px;
      animation:glow 6s infinite;
      margin-bottom:25px;
    }

    h1 { font-size:42px; }

    .search-box {
      display:flex;
      margin-top:20px;
      gap:10px;
    }

    .search-box input {
      flex:1;
      padding:12px;
      border-radius:15px;
      border:none;
      background:rgba(255,255,255,0.1);
      color:white;
    }

    .search-box button {
      padding:12px 20px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .quick-chip {
      margin:5px;
      padding:8px 12px;
      border-radius:20px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.1);
      color:white;
      cursor:pointer;
    }

    .results-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .result-card {
      background:var(--panel);
      border-radius:20px;
      padding:20px;
      transition:.3s;
    }

    .result-card:hover {
      transform:translateY(-5px);
      box-shadow:0 25px 45px rgba(0,0,0,0.4);
    }

    .ball {
      width:45px;
      height:45px;
      border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:white;
      color:black;
      font-weight:bold;
      margin:5px;
    }

    .ball.special {
      background:gold;
    }

    @media(max-width:800px){
      .results-grid{ grid-template-columns:1fr; }
    }

  </style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <strong>SNG Portal</strong>
    <nav class="menu">
      <a href="#">Accueil</a>
      <a href="#">Crypto</a>
      <a href="#">Actualités</a>
      <a href="#">Loterie</a>
    </nav>
  </div>
</header>

<main class="page">

<section class="hero">
  <h1>Choisis un endroit et vois le résultat</h1>

  <div class="search-box">
    <input placeholder="Ex: New York Lottery, France..." />
    <button>Chercher</button>
  </div>

  <div>
    <span class="quick-chip">République dominicaine</span>
    <span class="quick-chip">New York Lottery</span>
    <span class="quick-chip">EuroMillions</span>
    <span class="quick-chip">France</span>
  </div>
</section>

<section class="results-grid">

<article class="result-card">
<h3>New York</h3>
<div>New York Lottery</div>
<div>
  <span class="ball">08</span>
  <span class="ball">17</span>
  <span class="ball">29</span>
  <span class="ball">41</span>
  <span class="ball">61</span>
  <span class="ball special">14</span>
</div>
</article>

<article class="result-card">
<h3>France</h3>
<div>Loto</div>
<div>
  <span class="ball">03</span>
  <span class="ball">14</span>
  <span class="ball">22</span>
  <span class="ball">37</span>
  <span class="ball">45</span>
  <span class="ball special">07</span>
</div>
</article>

</section>

</main>

<div class="footer">
SNG Portal — version premium 🔥
</div>

</body>
</html>
